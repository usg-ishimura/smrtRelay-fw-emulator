<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dumb Thing Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d1117;
      --panel:      #161b22;
      --border:     #30363d;
      --victim:     #0071ee;
      --attacker:   #dc2626;
      --text:       #e6edf3;
      --muted:      #8b949e;
      --radius:     8px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', system-ui, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── header ─────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      height: 48px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -.2px;
      white-space: nowrap;
    }

    .brand-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,.2);
      flex-shrink: 0;
    }

    .pane-labels {
      display: flex;
      gap: 8px;
      flex: 1;
      justify-content: center;
    }

    .label {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      border: 1px solid var(--border);
    }

    .label-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .label.target  { color: #60a5fa; }
    .label.target .label-dot { background: var(--victim); box-shadow: 0 0 0 2px rgba(0,113,238,.25); }
    .label.attacker { color: #f87171; }
    .label.attacker .label-dot { background: var(--attacker); box-shadow: 0 0 0 2px rgba(220,38,38,.25); }

    .btn-back {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      transition: color .18s, border-color .18s;
      white-space: nowrap;
    }
    .btn-back:hover { color: var(--text); border-color: var(--muted); }

    /* ── split panes ─────────────────────────────────────────────────── */
    .panes {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 2px;
      background: var(--border);
    }

    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .pane-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .pane-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .pane-title.target   { color: #60a5fa; }
    .pane-title.attacker { color: #f87171; }

    .pane-subtitle {
      font-size: 11px;
      color: var(--muted);
    }

    .pane iframe {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-dot"></div>
    Dumb Thing  Lab
  </div>
  <div class="pane-labels">
    <div class="label target">
      <div class="label-dot"></div>
      Target
    </div>
    <div class="label attacker">
      <div class="label-dot"></div>
      Attacker
    </div>
  </div>
  <a class="btn-back" href="/">
    ← Control Panel
  </a>
</header>

<div class="panes">

  <div class="pane">
    <div class="pane-header">
      <div class="label-dot" style="width:7px;height:7px;border-radius:50%;background:var(--victim);"></div>
      <span class="pane-title target">Target  UART Shell</span>
      <span class="pane-subtitle">firmware console  115200 8N1</span>
    </div>
    <iframe src="/uart/" allow="clipboard-read; clipboard-write"></iframe>
  </div>

  <div class="pane">
    <div class="pane-header">
      <div class="label-dot" style="width:7px;height:7px;border-radius:50%;background:var(--attacker);"></div>
      <span class="pane-title attacker">Attacker  Listener Shell</span>
      <span class="pane-subtitle">same network namespace</span>
    </div>
    <iframe src="/attacker/" allow="clipboard-read; clipboard-write"></iframe>
  </div>

</div>

</body>
</html>
