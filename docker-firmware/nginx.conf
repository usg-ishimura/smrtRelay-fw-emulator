# Workers run as root so nginx doesn't need CAP_CHOWN to set up temp dirs.
# The container's capabilities are already stripped to a bare minimum via
# docker-compose (cap_drop: ALL + cap_add: NET_BIND_SERVICE only).
user root;

events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Log to stdout/stderr - no filesystem writes needed, no permission issues.
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    server {
        listen 80;
        server_name _;

        # Require HTTP Basic Auth for all endpoints.
        auth_basic           "Dumb Thing";
        auth_basic_user_file /etc/nginx/htpasswd;

        # ── custom web UI (modern frontend, served from image) ─────────────────
        root /app/www;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        # ── firmware controller API ───────────────────────────────────────────
        # These endpoints are called by the in-page JavaScript.
        location ~ ^/(on|off|status|schedule) {
            proxy_pass         http://127.0.0.1:5000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_read_timeout 10s;
        }

        location = /lab {
            try_files /lab.html =404;
        }

        # ── attacker shell ────────────────────────────────────────────────────
        location /attacker {
            proxy_pass         http://attacker:7682;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        # ── UART web terminal ─────────────────────────────────────────────────
        # Served at http://<host>/uart
        # ttyd is started with --base-path /uart so all its sub-paths
        # (/uart/token, /uart/ws, /uart/…) come through here.
        location /uart {
            proxy_pass         http://127.0.0.1:7681;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;    # keep WebSocket alive
        }
    }
}
