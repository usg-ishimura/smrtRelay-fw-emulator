<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dumb Thing Control Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f0f4f8;
      --card:        #ffffff;
      --primary:     #0071ee;
      --primary-dk:  #005ecc;
      --success:     #16a34a;
      --success-bg:  #f0fdf4;
      --success-bd:  #bbf7d0;
      --danger:      #dc2626;
      --danger-bg:   #fef2f2;
      --danger-bd:   #fecaca;
      --text:        #1a202c;
      --muted:       #64748b;
      --border:      #e2e8f0;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md:   0 4px 14px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.06);
      --radius:      14px;
      --radius-sm:   8px;
    }

    body {
      font-family: 'Inter', system-ui, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── header ────────────────────────────────────────────────────── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: var(--shadow-sm);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .brand-icon {
      width: 34px;
      height: 34px;
      background: var(--primary);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -.25px;
      color: var(--text);
    }

    .brand-sub {
      font-size: 16px;
      font-weight: 400;
      color: var(--muted);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 13px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .02em;
      color: var(--muted);
      user-select: none;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #cbd5e1;
      transition: background .3s, box-shadow .3s;
      flex-shrink: 0;
    }
    .dot.on  { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,.2); }
    .dot.off { background: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,.2); }

    #statusLabel { transition: color .3s; }
    #statusLabel.on  { color: var(--success); }
    #statusLabel.off { color: var(--danger); }

    .btn-uart {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--text);
      color: #fff;
      text-decoration: none;
      border-radius: var(--radius-sm);
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .02em;
      transition: opacity .18s;
    }
    .btn-uart:hover { opacity: .82; }

    /* ── main grid ─────────────────────────────────────────────────── */
    main {
      max-width: 880px;
      margin: 36px auto;
      padding: 0 20px;
      display: grid;
      gap: 20px;
      grid-template-columns: 1fr 1fr;
    }
    @media (max-width: 600px) { main { grid-template-columns: 1fr; } }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      padding: 26px;
    }
    .card-wide { grid-column: 1 / -1; }

    .card-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .ci {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-sm);
      background: #eff6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .ci svg {
      width: 20px;
      height: 20px;
      stroke: var(--primary);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-head-text .ct { font-size: 15px; font-weight: 600; }
    .card-head-text .cs { font-size: 12px; color: var(--muted); margin-top: 1px; }

    /* ── power buttons ─────────────────────────────────────────────── */
    .power-row { display: flex; gap: 12px; }

    .btn-pwr {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 10px;
      border-radius: 10px;
      border: 2px solid transparent;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-pwr svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .btn-on {
      background: var(--success-bg);
      border-color: var(--success-bd);
      color: var(--success);
    }
    .btn-on:hover, .btn-on.active {
      background: #16a34a;
      border-color: #16a34a;
      color: #fff;
      box-shadow: 0 4px 14px rgba(22,163,74,.3);
    }

    .btn-off {
      background: var(--danger-bg);
      border-color: var(--danger-bd);
      color: var(--danger);
    }
    .btn-off:hover, .btn-off.active {
      background: #dc2626;
      border-color: #dc2626;
      color: #fff;
      box-shadow: 0 4px 14px rgba(220,38,38,.3);
    }

    /* ── form fields ───────────────────────────────────────────────── */
    .field + .field { margin-top: 20px; }

    .field-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field-current {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .field-current strong { color: var(--text); font-weight: 600; }

    input[type="datetime-local"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input[type="datetime-local"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,113,238,.12);
    }

    .btn-save {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .2s, box-shadow .2s;
    }
    .btn-save:hover {
      background: var(--primary-dk);
      box-shadow: 0 4px 12px rgba(0,113,238,.28);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 22px 0;
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </div>
    <span class="brand-title">Dumb Thing &nbsp;<span class="brand-sub">Control Panel</span></span>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <span class="dot" id="dot"></span>
      <span id="statusLabel"></span>
    </div>
    <a class="btn-uart" href="/lab" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 17 10 11 4 5"/>
        <line x1="12" y1="19" x2="20" y2="19"/>
      </svg>
      LAB
    </a>
  </div>
</header>

<main>

  <!-- Power Control -->
  <div class="card">
    <div class="card-head">
      <div class="ci">
        <svg viewBox="0 0 24 24">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
          <line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
      </div>
      <div class="card-head-text">
        <div class="ct">Power Control</div>
        <div class="cs">Toggle the device on or off</div>
      </div>
    </div>
    <div class="power-row">
      <button class="btn-pwr btn-on" id="btnOn" onclick="sendOn()">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Turn ON
      </button>
      <button class="btn-pwr btn-off" id="btnOff" onclick="sendOff()">
        <svg viewBox="0 0 24 24">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
          <line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
        Turn OFF
      </button>
    </div>
  </div>

  <!-- System Time -->
  <div class="card">
    <div class="card-head">
      <div class="ci">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <div class="card-head-text">
        <div class="ct">System Time</div>
        <div class="cs">Update the device clock</div>
      </div>
    </div>
    <div class="field">
      <div class="field-current">Current: <strong id="systemTime"></strong></div>
      <div class="field-label">Set new time</div>
      <input type="datetime-local" id="timeInput">
      <button class="btn-save" onclick="submitSchedule('time', 'timeInput')">Update clock</button>
    </div>
  </div>

  <!-- Schedule -->
  <div class="card card-wide">
    <div class="card-head">
      <div class="ci">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <div class="card-head-text">
        <div class="ct">Schedule</div>
        <div class="cs">Set automatic on/off times</div>
      </div>
    </div>

    <div class="field">
      <div class="field-label">ON time</div>
      <div class="field-current">Current: <strong id="onScheduleTime"></strong></div>
      <input type="datetime-local" id="ontimeInput">
      <button class="btn-save" onclick="submitSchedule('ontime', 'ontimeInput')">Save ON schedule</button>
    </div>

    <hr class="divider">

    <div class="field">
      <div class="field-label">OFF time</div>
      <div class="field-current">Current: <strong id="offScheduleTime"></strong></div>
      <input type="datetime-local" id="offtimeInput">
      <button class="btn-save" onclick="submitSchedule('offtime', 'offtimeInput')">Save OFF schedule</button>
    </div>
  </div>

</main>

<script>
  document.addEventListener("DOMContentLoaded", getStatus);

  function getStatus() {
    fetch("/status")
      .then(r => r.json())
      .then(d => refreshUI(d.status, d.onSchedule, d.offSchedule, d.currentTime))
      .catch(() => {});
  }

  function refreshUI(on, onSched, offSched, sysTime) {
    const dot   = document.getElementById("dot");
    const label = document.getElementById("statusLabel");

    dot.className   = "dot " + (on ? "on" : "off");
    label.className = on ? "on" : "off";
    label.textContent = on ? "ON" : "OFF";

    document.getElementById("btnOn").classList.toggle("active", !!on);
    document.getElementById("btnOff").classList.toggle("active", !on);

    document.getElementById("onScheduleTime").textContent  = onSched  || "";
    document.getElementById("offScheduleTime").textContent = offSched || "";
    document.getElementById("systemTime").textContent      = sysTime  || "";
  }

  function sendOn() {
    fetch("/on", { method: "POST" })
      .then(r => { if (r.ok) refreshUI(true, null, null, null); getStatus(); });
  }

  function sendOff() {
    fetch("/off", { method: "POST" })
      .then(r => { if (r.ok) refreshUI(false, null, null, null); getStatus(); });
  }

  function submitSchedule(param, inputId) {
    const value = document.getElementById(inputId).value;
    if (!value) return;
    fetch("/schedule?" + param + "=" + encodeURIComponent(value)).then(getStatus);
  }
</script>

</body>
</html>
